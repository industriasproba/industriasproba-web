<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 46" fill="none" role="img" aria-label="Industrias Proba">
  <defs>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8722a"/>
      <stop offset="50%" stop-color="#e8923a"/>
      <stop offset="100%" stop-color="#b05f1e"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b3650"/>
      <stop offset="100%" stop-color="#1a2436"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: hexagon with "P" -->
  <polygon points="27,4 47,4 57,22 47,40 27,40 17,22" fill="url(#steel)" stroke="url(#copper)" stroke-width="1.5"/>
  <!-- Inner subtle highlight -->
  <polygon points="29,7 45,7 53,22 45,37 29,37 21,22" fill="none" stroke="#c8722a" stroke-width="0.4" stroke-opacity="0.4"/>

  <!-- Letter P inside hexagon -->
  <text x="31" y="28" font-family="Georgia, serif" font-size="20" font-weight="700" fill="url(#copper)" letter-spacing="-1">P</text>

  <!-- Company name -->
  <text x="68" y="18" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#1a2436" letter-spacing="1">INDUSTRIAS</text>
  <text x="68" y="34" font-family="Georgia, serif" font-size="17" font-weight="700" fill="url(#copper)" letter-spacing="2">PROBA</text>
</svg>
